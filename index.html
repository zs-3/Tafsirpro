<html lang="en">
<head>
<meta charset="UTF-8">

<title>Tafsir - Zayn</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --cream:       #f5f0e8;
    --cream-dark:  #ede6d6;
    --cream-border:#d9ceba;
    --green-deep:  #1a3d2b;
    --green-mid:   #2d6a4f;
    --green-light: #52b788;
    --green-pale:  #d8f3dc;
    --green-mist:  #e9f5eb;
    --text-main:   #1e2d1f;
    --text-mid:    #3a4f3b;
    --text-soft:   #6b7f6c;
    --gold:        #b5883a;
    --gold-light:  #f0d9a0;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bot:    env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background-color: var(--cream);
    color: var(--text-main);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(82,183,136,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(26,61,43,0.07) 0%, transparent 50%);
  }

  /* ── Header ──────────────────────────────────────────────────────────── */
  header {
    background: var(--green-deep);
    color: var(--cream);
    padding: 0 1.5rem;
    padding-top: var(--safe-top);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    min-height: calc(64px + var(--safe-top));
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(26,61,43,0.3);
  }

  .brand { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }
  .brand-icon {
    width: 32px; height: 32px; background: var(--green-light); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .brand-name { font-family: 'Amiri', serif; font-size: 1.25rem; font-weight: 700; color: var(--gold-light); }

  .header-actions { display: flex; align-items: center; gap: 0.5rem; flex: 1; max-width: 420px; justify-content: flex-end; }
  
  .back-btn {
    display: none; background: var(--gold); color: #fff; border: none; 
    border-radius: 6px; padding: 0.4rem 0.8rem; font-size: 0.85rem; 
    cursor: pointer; font-family: 'Lora', serif; font-weight: 600;
  }
  .back-btn:hover { background: #9d7530; }

  .selector-wrap { position: relative; flex: 1; }
  .selector-wrap::after {
    content: '▾'; position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%); color: var(--green-light); font-size: 12px; pointer-events: none;
  }

  #surahSelect {
    width: 100%; appearance: none; -webkit-appearance: none;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(82,183,136,0.35);
    border-radius: 8px; color: var(--cream); font-family: 'Lora', serif;
    font-size: 0.9rem; padding: 0.55rem 2.2rem 0.55rem 0.9rem; cursor: pointer; outline: none;
  }
  #surahSelect:focus { border-color: var(--green-light); background: rgba(255,255,255,0.12); }
  #surahSelect option { background: var(--green-deep); color: var(--cream); }

  /* ── Offline Banner ──────────────────────────────────────────────────── */
  #offlineBanner { display: none; background: var(--gold); color: #fff; text-align: center; font-size: 0.78rem; padding: 0.4rem 1rem; letter-spacing: 0.04em; }
  #offlineBanner.show { display: block; }

  /* ── Main Layout ─────────────────────────────────────────────────────── */
  main { max-width: 780px; margin: 0 auto; padding: 2rem 1.25rem calc(4rem + var(--safe-bot)); }

  .surah-header {
    text-align: center; margin-bottom: 2.5rem; padding: 2rem 1.5rem 1.75rem;
    background: var(--green-deep); border-radius: 16px; position: relative;
    overflow: hidden; box-shadow: 0 4px 24px rgba(26,61,43,0.2); animation: fadeSlideIn 0.35s ease both;
    cursor: pointer; transition: transform 0.2s;
  }
  .surah-header:hover { transform: scale(1.02); }
  .surah-header::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(82,183,136,0.25) 0%, transparent 70%); pointer-events: none;
  }
  .surah-header-ornament { font-size: 1.4rem; letter-spacing: 0.5rem; color: var(--gold-light); opacity: 0.5; margin-bottom: 0.5rem; pointer-events: none; }
  .surah-arabic { font-family: 'Amiri', serif; font-size: clamp(1.8rem, 5vw, 2.6rem); color: var(--gold-light); line-height: 1.3; margin-bottom: 0.3rem; pointer-events: none; }
  .surah-transliteration { font-size: 1rem; color: var(--green-light); font-style: italic; margin-bottom: 0.15rem; pointer-events: none; }
  .surah-meta { font-size: 0.8rem; color: rgba(245,240,232,0.45); letter-spacing: 0.08em; text-transform: uppercase; pointer-events: none; }

  .placeholder { text-align: center; padding: 5rem 2rem; color: var(--text-soft); animation: fadeSlideIn 0.4s ease both; }
  .placeholder-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: 0.35; }
  .placeholder p { font-size: 1.05rem; font-style: italic; line-height: 1.7; }
  .install-tip { display: none; margin-top: 1.5rem; font-size: 0.82rem; color: var(--green-mid); background: var(--green-pale); border-radius: 8px; padding: 0.75rem 1rem; line-height: 1.6; }

  /* ── Themes CSS ──────────────────────────────────────────────────────── */
  .ayah-list { display: flex; flex-direction: column; }
  .theme-wrapper { margin-bottom: 1.25rem; }
  .theme-toggle {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    background: var(--gold-light); color: var(--green-deep);
    padding: 0.85rem 1.2rem; border: none; border-radius: 12px;
    font-family: 'Lora', serif; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; box-shadow: 0 2px 8px rgba(181, 136, 58, 0.2);
    margin-bottom: 1rem; transition: background 0.2s;
  }
  .theme-toggle:hover { background: #e8cd8b; }
  .theme-toggle .theme-title { text-align: left; line-height: 1.4; padding-right: 1rem; }
  .theme-toggle .toggle-chevron { transition: transform 0.25s; font-size: 1.2rem; }
  .theme-toggle[aria-expanded="false"] .toggle-chevron { transform: rotate(-90deg); }
  .theme-body { display: flex; flex-direction: column; gap: 1.25rem; }

  /* ── Ayah Cards ──────────────────────────────────────────────────────── */
  .ayah-card { background: #fff; border-radius: 12px; border: 1px solid var(--cream-border); overflow: hidden; box-shadow: 0 1px 6px rgba(26,61,43,0.06); animation: fadeSlideIn 0.3s ease both; scroll-margin-top: 100px; }
  .ayah-card.highlight { border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(181, 136, 58, 0.4); }

  .ayah-top { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: var(--green-mist); border-bottom: 1px solid var(--cream-border); }
  .ayah-badge { width: 32px; height: 32px; border-radius: 50%; background: var(--green-deep); color: var(--green-pale); font-size: 0.72rem; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ayah-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); }

  /* ── Arabic Verse Text & Translation ──────────────────────────────────── */
  .ayah-translation { padding: 1rem 1.1rem 0.85rem; border-bottom: 1px solid var(--cream-border); position: relative; }
  .ayah-translation::before { content: '"'; font-family: 'Amiri', serif; font-size: 2.8rem; color: var(--green-light); opacity: 0.28; position: absolute; top: 0.1rem; left: 0.7rem; line-height: 1; }
  
  .verse-arabic {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    line-height: 2.3;
    color: var(--green-deep);
    direction: rtl;
    text-align: right;
    margin-bottom: 0.5rem;
  }

  /* ── Word-By-Word Roots Styling ──────────────────────────────────────── */
  .wbw-word.has-root {
    border-bottom: 1px dotted rgba(181, 136, 58, 0.8);
    cursor: pointer;
    transition: color 0.2s ease, border-bottom-color 0.2s ease;
  }
  .wbw-word.has-root:hover {
    color: var(--gold);
    border-bottom-color: var(--green-deep);
  }
  
  .verse-transliteration {
    font-size: 0.95rem;
    color: var(--green-mid);
    font-style: italic;
    text-align: left;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px dashed var(--cream-border);
  }

  .translation-text {
    padding-left: 1.4rem;
    font-size: 1.02rem;
    line-height: 1.75;
    color: var(--text-main);
  }

  /* ── Language Insights CSS ───────────────────────────────────────────── */
  .language-insights {
    padding: 1rem 1.1rem 0.5rem;
    border-bottom: 1px solid var(--cream-border);
    background: linear-gradient(to bottom, rgba(255,255,255,0), var(--green-mist));
  }
  .insights-title { font-family: 'Lora', serif; font-size: 0.75rem; color: var(--green-mid); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
  .insights-title::before { content: '✧'; color: var(--gold); font-size: 0.85rem; }
  .insight-item { display: flex; gap: 1rem; margin-bottom: 0.85rem; align-items: flex-start; }
  
  .insight-arabic {
    font-family: 'Amiri', serif; 
    font-size: 1.35rem; 
    color: var(--green-deep);
    direction: rtl; 
    line-height: 1.6;
    background: var(--green-pale); 
    padding: 0.4rem 0.7rem; 
    border-radius: 6px; 
    white-space: normal;
    border: 1px solid rgba(82,183,136,0.2); 
    text-align: right;
  }
  
  .insight-text { font-size: 0.92rem; line-height: 1.6; color: var(--text-mid); padding-top: 0.2rem; }
  
  .insight-type-badge {
    display: inline-block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em;
    background: var(--cream-border); color: var(--text-mid); padding: 0.15rem 0.4rem; border-radius: 4px; margin-right: 0.4rem; vertical-align: middle;
  }
  
  .type-word { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
  .type-phrase { background: #f3e5f5; color: #4a148c; border: 1px solid #e1bee7; }
  .type-verse { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }

  /* ── Commentary & Matching CSS ───────────────────────────────────────── */
  .section-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0.7rem 1.1rem; background: none; border: none; border-bottom: 1px solid transparent; cursor: pointer; font-family: 'Lora', serif; font-size: 0.8rem; color: var(--green-mid); text-align: left; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; transition: background 0.15s; }
  .section-toggle:hover { background: var(--green-pale); }
  .toggle-chevron { font-size: 0.75rem; transition: transform 0.25s ease; flex-shrink: 0; }
  .section-toggle[aria-expanded="true"] .toggle-chevron { transform: rotate(180deg); }
  .section-toggle[aria-expanded="true"] { border-bottom-color: var(--cream-border); }

  /* ── Tabbed Tafsir Buttons (Half & Half) ──────────────────────────────── */
  .tafsir-toggles {
      display: flex;
      width: 100%;
      border-bottom: 1px solid transparent;
  }
  .tafsir-toggle-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.7rem 0.5rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: 'Lora', serif;
      font-size: 0.8rem;
      color: var(--green-mid);
      text-align: center;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 600;
      transition: background 0.15s, border-bottom-color 0.15s;
  }
  .tafsir-toggle-btn:hover:not(:disabled) { background: var(--green-pale); }
  .tafsir-toggle-btn[aria-expanded="true"] {
      background: var(--green-pale);
      border-bottom-color: var(--green-mid);
  }
  .tafsir-toggle-btn[aria-expanded="true"] .toggle-chevron { transform: rotate(180deg); }
  .tafsir-toggle-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      color: var(--text-soft);
  }
  .tafsir-toggles .tafsir-toggle-btn:first-child {
      border-right: 1px solid var(--cream-border);
  }

  .section-body { display: none; padding: 1.1rem; color: var(--text-mid); font-size: 0.97rem; line-height: 1.85; }
  .section-body.open { display: block; animation: expandIn 0.2s ease both; }

  .commentary-body .cm-arabic { font-family: 'Amiri', serif; font-size: 1.25rem; color: var(--green-deep); direction: rtl; text-align: right; display: block; margin: 0.6rem 0 0.9rem; line-height: 1.7; }
  .commentary-body h2, .commentary-body h3 { font-family: 'Lora', serif; color: var(--green-deep); margin: 1.1rem 0 0.4rem; font-weight: 600; }
  .commentary-body h2 { font-size: 1rem; }
  .commentary-body h3 { font-size: 0.93rem; font-style: italic; }
  .commentary-body p  { margin-bottom: 0.85rem; }
  .commentary-body strong { color: var(--green-deep); font-weight: 600; }
  .commentary-body em     { color: var(--text-soft); font-style: italic; }
  
  .matching-links { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .matching-link { display: inline-block; padding: 0.4rem 0.8rem; background: var(--green-pale); border: 1px solid var(--green-light); border-radius: 6px; color: var(--green-deep); text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: background 0.2s; }
  .matching-link:hover { background: var(--green-light); color: white; }

  .no-data { padding: 0.55rem 1.1rem 0.8rem; font-size: 0.78rem; color: var(--text-soft); font-style: italic; border-top: 1px dashed var(--cream-border); }

  /* ── Modals & Utils ──────────────────────────────────────────────────── */
  dialog {
    margin: auto; padding: 2rem; border-radius: 12px; border: 1px solid var(--cream-border);
    box-shadow: 0 4px 24px rgba(26,61,43,0.3); max-width: 90%; width: 450px;
    background: var(--cream); color: var(--text-main); font-family: 'Lora', serif;
  }
  dialog::backdrop { background: rgba(26,61,43,0.6); backdrop-filter: blur(2px); }
  .dialog-title { font-family: 'Amiri', serif; font-size: 1.8rem; color: var(--green-deep); margin-bottom: 0.5rem; text-align: center; }
  .dialog-meta { font-size: 0.9rem; color: var(--text-soft); margin-bottom: 1.5rem; text-align: center; text-transform: uppercase; letter-spacing: 0.05em; }
  .dialog-content { font-size: 1rem; line-height: 1.7; margin-bottom: 1.5rem; }
  .dialog-close { display: block; width: 100%; padding: 0.75rem; background: var(--green-deep); color: white; border: none; border-radius: 8px; font-family: 'Lora', serif; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
  .dialog-close:hover { background: var(--green-mid); }

  .loader { text-align: center; padding: 4rem 2rem; color: var(--text-soft); font-style: italic; animation: pulse 1.4s ease-in-out infinite; }
  .error-msg { background: #fdf0f0; border: 1px solid #e8c5c5; border-radius: 10px; padding: 1.25rem 1.5rem; color: #7a3535; font-size: 0.92rem; line-height: 1.6; margin-top: 1rem; }
  #scrollTop { position: fixed; bottom: calc(1.5rem + var(--safe-bot)); right: 1.5rem; width: 44px; height: 44px; border-radius: 50%; background: var(--green-deep); color: var(--cream); border: none; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(26,61,43,0.3); opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; pointer-events: none; z-index: 99; }
  #scrollTop.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes expandIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

  /* ── Mobile ──────────────────────────────────────────────────────────── */
  @media (max-width: 480px) {
    header { padding: 0.7rem 1rem; flex-wrap: wrap; }
    .header-actions { min-width: 100%; order: 3; justify-content: space-between; }
    main { padding: 1.25rem 0.85rem calc(3rem + var(--safe-bot)); }
    .surah-header { padding: 1.5rem 1rem 1.25rem; }
    .insight-item { flex-direction: column; gap: 0.4rem; }
    .insight-arabic { align-self: stretch; text-align: right; }
    .verse-arabic { font-size: 1.7rem; }
  }
</style>
</head>
<body>

<div id="offlineBanner">📵 You're offline — showing cached content</div>

<header>
  <div class="brand">
    <div class="brand-icon">☽</div>
    <span class="brand-name">Quran Reader</span>
  </div>
  <div class="header-actions">
    <button id="backBtn" class="back-btn" onclick="goBack()">◂ Back</button>
    <div class="selector-wrap">
      <select id="surahSelect" aria-label="Select a Surah"></select>
    </div>
  </div>
</header>

<main id="main">
  <div class="placeholder">
    <div class="placeholder-icon">📖</div>

      ✅ App installed! Surahs you open are saved offline automatically.
    </div>
  </div>
</main>

<button id="scrollTop" aria-label="Scroll to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<dialog id="surahInfoModal"></dialog>

<script>
// ── Service Worker & PWA Logic ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.warn('[SW] failed:', err));
  });
}
window.addEventListener('online',  () => document.getElementById('offlineBanner').classList.remove('show'));
window.addEventListener('offline', () => document.getElementById('offlineBanner').classList.add('show'));
if (!navigator.onLine) document.getElementById('offlineBanner').classList.add('show');
if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
  document.getElementById('installTip').style.display = 'block';
}

const select = document.getElementById('surahSelect');
select.innerHTML = '<option value="" disabled selected>— Choose a Surah —</option>';
SURAHS.forEach(([num, translit, arabic, meaning, verses]) => {
  select.innerHTML += `<option value="${num}">${num}. ${translit} (${verses})</option>`;
});

// Utilities
function escHtml(s) { return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleSection(btn) { 
  btn.setAttribute('aria-expanded', btn.nextElementSibling.classList.toggle('open')); 
}

// Handles switching between Concise and Detailed Tafsir tabs
function toggleTafsirView(btn, type) {
    const container = btn.closest('.commentary-section');
    const conciseBtn = container.querySelector('.tafsir-toggle-btn:nth-child(1)');
    const detailedBtn = container.querySelector('.tafsir-toggle-btn:nth-child(2)');
    const conciseBody = container.querySelector('.concise-body');
    const detailedBody = container.querySelector('.detailed-body');

    const isCurrentlyExpanded = btn.getAttribute('aria-expanded') === 'true';

    // Reset both states
    if (conciseBtn) conciseBtn.setAttribute('aria-expanded', 'false');
    if (detailedBtn) detailedBtn.setAttribute('aria-expanded', 'false');
    if (conciseBody) conciseBody.classList.remove('open');
    if (detailedBody) detailedBody.classList.remove('open');

    // If it was already expanded, we just close it (handled above). 
    // If it wasn't, we open the selected tab.
    if (!isCurrentlyExpanded) {
        btn.setAttribute('aria-expanded', 'true');
        if (type === 'concise' && conciseBody) {
            conciseBody.classList.add('open');
        } else if (type === 'detailed' && detailedBody) {
            detailedBody.classList.add('open');
        }
    }
}

function toggleTheme(btn) {
  const isExpanded = btn.getAttribute('aria-expanded') === 'true';
  btn.setAttribute('aria-expanded', !isExpanded);
  const body = btn.nextElementSibling;
  body.style.display = isExpanded ? 'none' : 'flex';
}

function cleanText(rawStr) {
  let str = rawStr.trim();
  str = str.replace(/^(?:<br\s*\/?>\s*|-|—)+/gi, '').trim();
  str = str.replace(/(?:<br\s*\/?>\s*)+$/gi, '').trim();
  return str;
}

function renderCommentary(raw) {
  if (!raw) return '';
  const lines = raw.split('\n');
  let html = ''; let i = 0;
  if (lines[0] && /[\u0600-\u06FF]/.test(lines[0])) { html += `<span class="cm-arabic">${escHtml(lines[0])}</span>`; i = 1; }
  lines.slice(i).join('\n').split('\n\n').forEach(seg => {
    const t = seg.trim();
    if (!t) return;
    if (t.startsWith('### ')) html += `<h3>${escHtml(t.slice(4))}</h3>`;
    else if (t.startsWith('## ')) html += `<h2>${escHtml(t.slice(3))}</h2>`;
    else if (t.startsWith('# ')) html += `<h2>${escHtml(t.slice(2))}</h2>`;
    else html += `<p>${t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>').split('\n').join('<br>')}</p>`;
  });
  return html;
}

function showSurahInfo(num) {
  const meta = SURAHS[num - 1];
  const dialog = document.getElementById('surahInfoModal');
  
  let infoHtml = `
    <div class="dialog-title">${meta[2]}</div>
    <div class="dialog-meta">Surah ${meta[1]}</div>
    <div class="dialog-content">
      <strong>Meaning:</strong> ${meta[3]}<br><br>
      <strong>Total Verses:</strong> ${meta[4]} Ayahs<br><br>
  `;

  if (cachedSurahInfo && cachedSurahInfo[num]) {
      const details = cachedSurahInfo[num];
      infoHtml += `<strong>Introduction:</strong><br>${details.short_text || details.text || ''}`;
  } else {
      infoHtml += `<em>Detailed contextual information is currently loading or unavailable.</em>`;
  }

  infoHtml += `
    </div>
    <button class="dialog-close" onclick="this.closest('dialog').close()">Close</button>
  `;
  
  dialog.innerHTML = infoHtml;
  dialog.showModal();
}

function showRootInfo(rootStr) {
  const dialog = document.getElementById('surahInfoModal');
  
  if (!cachedRootsIndex || !cachedRootsIndex[rootStr]) {
      dialog.innerHTML = `
          <div class="dialog-title">Not Found</div>
          <div class="dialog-content">Root meaning for <strong>${escHtml(rootStr)}</strong> could not be loaded.</div>
          <button class="dialog-close" onclick="this.closest('dialog').close()">Close</button>
      `;
      dialog.showModal();
      return;
  }
  
  const rData = cachedRootsIndex[rootStr];
  let infoHtml = `
      <div class="dialog-title">${escHtml(rootStr)}</div>
      <div class="dialog-meta">Root Word Information</div>
      <div class="dialog-content">
          <strong>Transliteration:</strong> ${escHtml(rData.b)}<br><br>
          <strong>Meaning:</strong> ${escHtml(rData.m)}<br><br>
          <strong>Frequency:</strong> Occurs ${rData.f} times in the Quran<br><br>
          ${rData.fam ? `<strong>Theme / Family:</strong> ${escHtml(rData.fam)}` : ''}
      </div>
      <button class="dialog-close" onclick="this.closest('dialog').close()">Close</button>
  `;
  
  dialog.innerHTML = infoHtml;
  dialog.showModal();
}

// ── App State & Fetching ────────────────────────────────────────────────
let currentLoad = 0;
let cachedQuranData = null; 
let cachedTransliteration = null; 
let cachedThemesData = null;
let cachedSurahInfo = null;
let cachedMatchingAyahs = null;
let cachedRootsIndex = null; 
let historyStack = [];

select.addEventListener('change', () => {
    historyStack = [];
    document.getElementById('backBtn').style.display = 'none';
    loadSurah(parseInt(select.value));
});

const scrollBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => scrollBtn.classList.toggle('visible', window.scrollY > 300), { passive: true });

function jumpToAyah(surah, ayah) {
  const currentSurah = parseInt(select.value);
  historyStack.push({ surah: currentSurah, scrollY: window.scrollY });
  document.getElementById('backBtn').style.display = 'block';
  select.value = surah;
  loadSurah(surah, ayah);
}

function goBack() {
  if (historyStack.length === 0) return;
  const prev = historyStack.pop();
  
  if (historyStack.length === 0) {
      document.getElementById('backBtn').style.display = 'none';
  }
  
  select.value = prev.surah;
  loadSurah(prev.surah, null, prev.scrollY);
}

async function loadSurah(num, targetAyah = null, targetScroll = null) {
  const myLoad = ++currentLoad;
  const mainEl = document.getElementById('main');
  const meta = SURAHS[num - 1];

  mainEl.innerHTML = `<div class="loader">Loading ${meta[1]}…</div>`;

  let tafsirData = null;
  let conciseTafsirData = null; // New variable for Concise Tafsir
  let langData = null;
  let wbwData = null; 

  try {
    if (!cachedQuranData) {
      const quranRes = await fetch(`data/quran.json`);
      if (quranRes.ok) cachedQuranData = await quranRes.json();
    }
    
    if (!cachedTransliteration) {
        const transRes = await fetch(`data/english-transliteration-tajweed-simple.json`);
        if (transRes.ok) cachedTransliteration = await transRes.json();
    }

    if (!cachedThemesData) {
        const themesRes = await fetch(`data/themes_output.json`);
        if (themesRes.ok) cachedThemesData = await themesRes.json();
    }

    if (!cachedSurahInfo) {
        const infoRes = await fetch(`data/surah-info-en.json`);
        if (infoRes.ok) cachedSurahInfo = await infoRes.json();
    }
    
    if (!cachedRootsIndex) {
        const rootsRes = await fetch(`data/roots_index.json`);
        if (rootsRes.ok) cachedRootsIndex = await rootsRes.json();
    }

    if (!cachedMatchingAyahs) {
        const matchRes = await fetch(`data/matching-ayah.json`);
        if (matchRes.ok) cachedMatchingAyahs = await matchRes.json();
    }

    // Try fetching the word-by-word structural data
    try {
        const wbwRes = await fetch(`wbw/${num}.json`);
        if (wbwRes.ok) wbwData = await wbwRes.json();
    } catch(e) {
        console.warn(`WBW data for Surah ${num} not found.`);
    }

    // Fetch original detailed Tafsir data
    const tafsirRes = await fetch(`data/${num}.json`);
    if (!tafsirRes.ok) throw new Error(`Tafsir HTTP error: ${tafsirRes.status}`);
    tafsirData = await tafsirRes.json();
    
    // Fetch newly added concise Islahi Tafsir data
    try {
        const conciseRes = await fetch(`data/surah_${num}_translated.json`);
        if (conciseRes.ok) conciseTafsirData = await conciseRes.json();
    } catch(e) {
        console.warn(`Concise Tafsir data for Surah ${num} not found.`);
    }

  } catch(e) {
    if (myLoad !== currentLoad) return;
    mainEl.innerHTML = `
      <div class="error-msg">
        <strong>Could not load Surah ${num}.</strong><br>
        Make sure <code>data/${num}.json</code> is present.<br>
        <small>${escHtml(e.message)}</small>
      </div>`;
    return;
  }

  try {
    const langRes = await fetch(`data/lang_${num}.json`);
    if (langRes.ok) langData = await langRes.json();
  } catch(e) {
    console.warn(`Linguistic insights for Surah ${num} not found. Skipping.`);
  }

  if (myLoad !== currentLoad) return;

  // Pre-process Surah Data
  let currentSurahArabicVerses = [];
  if (cachedQuranData) {
    const qMatch = cachedQuranData.find(s => s.id === num);
    if (qMatch && qMatch.verses) currentSurahArabicVerses = qMatch.verses;
  }

  const surahThemes = (cachedThemesData || [])
                        .filter(t => t.surah_number === num)
                        .sort((a,b) => a.ayah_from - b.ayah_from);

  // ── Group Ayahs into Thematic Blocks ──
  let blocks = [];
  let currentBlock = { theme: null, ayahs: [] };

  tafsirData.forEach(ayahObj => {
    const ayahNum = ayahObj.ayah || ayahObj.id;
    
    // Find if this ayah belongs to any defined theme scope
    const matchingTheme = surahThemes.find(t => ayahNum >= t.ayah_from && ayahNum <= t.ayah_to);
    
    if (matchingTheme !== currentBlock.theme) {
        // Push the previous block if it has content
        if (currentBlock.ayahs.length > 0) blocks.push(currentBlock);
        
        // Start a new block
        currentBlock = { theme: matchingTheme, ayahs: [ayahObj] };
    } else {
        // Add to the current block
        currentBlock.ayahs.push(ayahObj);
    }
  });
  
  if (currentBlock.ayahs.length > 0) {
      blocks.push(currentBlock);
  }

  // Render Header
  let html = `
    <div class="surah-header" onclick="showSurahInfo(${num})" title="Click to view Surah info">
      <div class="surah-header-ornament">— ✦ —</div>
      <div class="surah-arabic">${escHtml(meta[2])}</div>
      <div class="surah-transliteration">${escHtml(meta[1])}</div>
      <div class="surah-meta">${escHtml(meta[3])} &nbsp;·&nbsp; ${meta[4]} Ayahs</div>
    </div>
    <div class="ayah-list">`;

  // Render Ayahs mapped to themes
  blocks.forEach(block => {
      
      if (block.theme) {
          html += `
          <div class="theme-wrapper">
              <button class="theme-toggle" onclick="toggleTheme(this)" aria-expanded="true">
                  <span class="theme-title">🔖 Theme: ${escHtml(block.theme.theme)}</span>
                  <span class="toggle-chevron">▾</span>
              </button>
              <div class="theme-body">
          `;
      } else {
          html += `<div class="theme-wrapper"><div class="theme-body">`;
      }
      
      block.ayahs.forEach(ayahObj => {
          const surahNum = ayahObj.surah || num;
          const ayahNum = ayahObj.ayah || ayahObj.id;
          const translation = ayahObj.translation || ayahObj.text || '';
          const commentary = ayahObj.commentary || ayahObj.tafsir || '';
          
          // Assemble Arabic Html with Word-by-Word roots
          let arabicHtml = '';
          if (wbwData) {
              const wbwMatch = wbwData.find(v => v.a === ayahNum);
              if (wbwMatch && wbwMatch.words) {
                  arabicHtml = wbwMatch.words.map(w => {
                      if (w.r) {
                          const escapedRoot = w.r.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                          return `<span class="wbw-word has-root" onclick="showRootInfo('${escapedRoot}')">${escHtml(w.t)}</span>`;
                      } else {
                          return `<span class="wbw-word">${escHtml(w.t)}</span>`;
                      }
                  }).join(' ');
              }
          }
          // Fallback to static text if wbw payload is missing or lacks the ayah
          if (!arabicHtml && currentSurahArabicVerses.length > 0) {
              const staticMatch = currentSurahArabicVerses.find(v => v.id === ayahNum);
              if (staticMatch) arabicHtml = escHtml(staticMatch.text);
          }
          
          let transText = '';
          if (cachedTransliteration && cachedTransliteration[`${surahNum}:${ayahNum}`]) {
              transText = cachedTransliteration[`${surahNum}:${ayahNum}`].t;
          }
      
          html += `
            <div class="ayah-card ${targetAyah === ayahNum ? 'highlight' : ''}" id="ayah-${ayahNum}">
              <div class="ayah-top">
                <div class="ayah-badge">${ayahNum}</div>
                <span class="ayah-label">Surah ${surahNum} · Ayah ${ayahNum}</span>
              </div>
              <div class="ayah-translation">
                ${arabicHtml ? `<div class="verse-arabic">${arabicHtml}</div>` : ''}
                ${transText ? `<div class="verse-transliteration">${escHtml(transText)}</div>` : ''}
                <div class="translation-text">${escHtml(translation || '—')}</div>
              </div>`;
      
          // Language Insights
          if (langData && langData.language_insights) {
            const searchRef = `${surahNum}_${ayahNum}`;
            const ayahInsights = langData.language_insights.find(ins => ins.formatted_ayah_ref === searchRef);
      
            if (ayahInsights && ayahInsights.details && ayahInsights.details.length > 0) {
              html += `
                <div class="language-insights">
                  <div class="insights-title">Linguistic Notes</div>`;
              
              ayahInsights.details.forEach(detail => {
                const cleanedText = cleanText(detail.text);
                const badgeClass = `type-${(detail.insight_type || 'word').toLowerCase()}`;
                
                html += `
                  <div class="insight-item">
                    ${detail.arabic_part ? `<div class="insight-arabic">${escHtml(detail.arabic_part)}</div>` : ''}
                    <div class="insight-text">
                      <span class="insight-type-badge ${badgeClass}">${escHtml(detail.insight_type || 'Note')}</span>
                      ${cleanedText}
                    </div>
                  </div>`;
              });
              html += `</div>`; 
            }
          }
      
          // Fetch specific Concise text for this ayah
          let conciseText = '';
          if (conciseTafsirData) {
              const cMatch = conciseTafsirData.find(c => c.AyahNumber === ayahNum);
              if (cMatch && cMatch.Tafseer) conciseText = cMatch.Tafseer;
          }

          const detailedText = commentary;
          const hasDetailed = detailedText && detailedText.trim().length > 0;
          const hasConcise = conciseText && conciseText.trim().length > 0;
          
          // Side-by-side Tabs for Tafsir (Concise | Detailed)
          if (hasDetailed || hasConcise) {
            html += `
              <div class="commentary-section">
                <div class="tafsir-toggles">
  <button class="tafsir-toggle-btn" onclick="toggleTafsirView(this, 'detailed')" ${!hasDetailed ? 'disabled' : ''} aria-expanded="false">
    Concise Tafsir <span class="toggle-chevron">▾</span>
  </button>
  <button class="tafsir-toggle-btn" onclick="toggleTafsirView(this, 'concise')" ${!hasConcise ? 'disabled' : ''} aria-expanded="false">
    Coherent Tafsir <span class="toggle-chevron">▾</span>
  </button>
</div>
                ${hasConcise ? `<div class="section-body commentary-body concise-body">${renderCommentary(conciseText)}</div>` : ''}
                ${hasDetailed ? `<div class="section-body commentary-body detailed-body">${renderCommentary(detailedText)}</div>` : ''}
              </div>`;
          } else {
            html += `<div class="no-data">No commentary available.</div>`;
          }
      
          // Matching Ayahs
          const matchKey = `${surahNum}:${ayahNum}`;
          let matching = [];
          if (cachedMatchingAyahs && cachedMatchingAyahs[matchKey]) {
              matching = cachedMatchingAyahs[matchKey];
          }

          if (matching && matching.length > 0) {
              html += `
              <div class="matching-section">
                <button class="section-toggle" onclick="toggleSection(this)" aria-expanded="false">
                  Related Verses <span class="toggle-chevron">▾</span>
                </button>
                <div class="section-body matching-body">
                  <div class="matching-links">`;
              matching.forEach(m => {
                  const [mSurah, mAyah] = m.matched_ayah_key.split(':');
                  html += `<a href="javascript:void(0)" onclick="jumpToAyah(${mSurah}, ${mAyah})" class="matching-link">Surah ${mSurah}, Ayah ${mAyah}</a>`;
              });
              html += `</div></div></div>`;
          }
      
          html += `</div>`;
      });
      
      html += `</div></div>`; // End of theme-body and theme-wrapper
  });

  html += `</div>`; // End of ayah-list
  mainEl.innerHTML = html;
  
  // Handling Scroll/Jump target logic
  if (targetAyah) {
      setTimeout(() => {
          const el = document.getElementById(`ayah-${targetAyah}`);
          if (el) {
              const yOffset = el.getBoundingClientRect().top + window.scrollY - 80;
              window.scrollTo({ top: yOffset, behavior: 'smooth' });
              
              setTimeout(() => { el.classList.remove('highlight'); }, 3000);
          }
      }, 100);
  } else if (targetScroll !== null) {
      setTimeout(() => {
          window.scrollTo({ top: targetScroll, behavior: 'instant' });
      }, 50);
  } else {
      window.scrollTo({ top: 0, behavior: 'instant' });
  }
}
</script>
